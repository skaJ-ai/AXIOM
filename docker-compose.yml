services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-http://168.219.61.252:8080}
        HTTPS_PROXY: ${HTTPS_PROXY:-http://168.219.61.252:8080}
        NPM_PROXY: ${NPM_PROXY:-http://168.219.61.252:8080}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,10.240.248.157}
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMIN_LOGIN_ID: ${ADMIN_LOGIN_ID:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql://axiom:axiom@db:5432/axiom}
      HTTPS_PROXY: ${HTTPS_PROXY:-http://168.219.61.252:8080}
      HTTP_PROXY: ${HTTP_PROXY:-http://168.219.61.252:8080}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      LLM_API_URL: ${LLM_API_URL:-http://10.240.248.157:8533/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_KEY_HEADER: ${LLM_API_KEY_HEADER:-Authorization}
      LLM_MODEL: ${LLM_MODEL:-Qwen3-Next}
      NODE_ENV: production
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,10.240.248.157}
      https_proxy: ${HTTPS_PROXY:-http://168.219.61.252:8080}
      http_proxy: ${HTTP_PROXY:-http://168.219.61.252:8080}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,10.240.248.157}
    ports:
      - "26000:3000"
    restart: unless-stopped

  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axiom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axiom}
      POSTGRES_USER: ${POSTGRES_USER:-axiom}
    healthcheck:
      interval: 5s
      retries: 10
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axiom} -d ${POSTGRES_DB:-axiom}"]
      timeout: 5s
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
